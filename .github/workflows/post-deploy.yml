name: Post-Deploy Verification

on:
  deployment_status:

jobs:
  verify:
    name: Run Post-Deploy Health Check
    if: github.event.deployment_status.state == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Await Deployment Warmup
        run: sleep 5

      - name: Query Live Health Telemetry
        id: health_check
        run: |
          DEPLOY_URL="${{ github.event.deployment_status.target_url }}"
          HEALTH_URL="${DEPLOY_URL}/api/health"
          echo "Querying health status at: $HEALTH_URL"
          
          RESPONSE=$(curl -s -w "\n%{http_code}" "$HEALTH_URL")
          HTTP_BODY=$(echo "$RESPONSE" | head -n -1)
          HTTP_STATUS=$(echo "$RESPONSE" | tail -n 1)
          
          echo "HTTP Status Code: $HTTP_STATUS"
          echo "Response Body: $HTTP_BODY"
          
          if [ "$HTTP_STATUS" -ne 200 ] && [ "$HTTP_STATUS" -ne 302 ]; then
            echo "Error: Health check failed with status $HTTP_STATUS"
            exit 1
          fi
          
          echo "Deployment verified. Status is OK!"
