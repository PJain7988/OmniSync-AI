services:
  # ─── Backend API (Node/Express) ────────────────────────────────────────────
  - type: web
    name: omnisync-backend
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: GEMINI_API_KEY
        sync: false
    healthCheckPath: /api/health

  # ─── Frontend (Static Site via Vite build) ─────────────────────────────────
  - type: web
    name: omnisync-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        value: https://omnisync-backend.onrender.com/api
