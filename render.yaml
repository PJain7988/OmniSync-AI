services:
  # ─── Unified Full-Stack Service ─────────────────────────────────────────────
  # Backend serves the built React frontend + all /api/* routes from ONE URL.
  # No cross-origin issues. No separate static site needed.
  - type: web
    name: omnisync-ai
    env: node
    rootDir: .
    buildCommand: npm install --prefix backend && npm install --prefix frontend && npm run build --prefix frontend
    startCommand: node backend/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: GEMINI_API_KEY
        sync: false
    healthCheckPath: /api/health
